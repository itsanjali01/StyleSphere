services:
  - type: web
    name: ecommerce-app
    env: node
    rootDir: .
    buildCommand: |
      cd client && npm install --include=dev && npm run build
      cd ../server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
